<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment Room | AptIQ</title>
  <style>
    * { box-sizing: border-box; font-family: sans-serif; }
    body { background-color: #f8fafc; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; transition: 0.3s; }
    
    .test-card { background: white; width: 100%; max-width: 950px; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; z-index: 10; border: 1px solid rgba(14,30,60,0.04); transition: max-width 0.4s ease; }
    
    .test-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .q-info { display: flex; flex-direction: column; }
    .q-number { font-size: 22px; font-weight: bold; color: #0f172a; margin-bottom: 4px; }
    .q-task { font-size: 13px; color: #64748b; text-transform: uppercase; font-weight: bold; }
    
    .timer { background: #fef2f2; color: #dc2626; padding: 10px 18px; border-radius: 8px; font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 8px; border: 1px solid #fecaca; }
    .progress-info { text-align: right; font-size: 13px; color: #64748b; font-weight: bold; }
    .progress-bar { width: 160px; height: 8px; background: #e2e8f0; border-radius: 4px; margin-top: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: #3b82f6; width: 0%; transition: width 0.3s ease; }

    .proctor-box { display: flex; align-items: center; gap: 15px; background: #fef2f2; padding: 8px 15px; border-radius: 8px; border: 1px solid #fecaca; }
    .video-feed { width: 80px; height: 60px; background: #000; border-radius: 6px; object-fit: cover; border: 2px solid #ef4444; }
    .proctor-text { color: #dc2626; font-size: 13px; font-weight: bold; display: flex; flex-direction: column; }

    .question-text { font-size: 20px; font-weight: bold; color: #0f172a; margin-bottom: 25px; line-height: 1.5; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
    .option-btn { background: #fff; border: 2px solid #e2e8f0; padding: 18px; border-radius: 12px; text-align: left; font-size: 16px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 15px; color: #334155; font-weight: bold; }
    .option-btn:hover { border-color: #cbd5e1; background: #f8fafc; }
    .opt-letter { background: #e2e8f0; color: #475569; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; border-radius: 8px; font-weight: bold; transition: 0.2s; }
    .option-btn.correct { border-color: #10b981; background: #ecfdf5; color: #047857; }
    .option-btn.correct .opt-letter { background: #10b981; color: white; }
    .option-btn.wrong { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }
    .option-btn.wrong .opt-letter { background: #ef4444; color: white; }

    .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; border-top: 1px solid #f1f5f9; padding-top: 20px; }
    .btn { padding: 14px 28px; border-radius: 8px; font-weight: bold; font-size: 16px; border: none; cursor: pointer; transition: 0.2s; }
    .btn-ghost { background: #f1f5f9; color: #0f172a; }
    .btn-primary { background: #8b5cf6; color: white; }
    
    .overlay-screen { text-align: center; padding: 60px 0; }
    
    .terminal-scroll::-webkit-scrollbar { width: 8px; }
    .terminal-scroll::-webkit-scrollbar-track { background: #0f172a; }
    .terminal-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  </style>
</head>
<body>

  <div id="watermarkLayer"></div>

  <div class="test-card" id="testCard">
    <div class="overlay-screen" id="loadingScreen">
      <h2 style="font-size: 24px; color: #0f172a;">Initializing Assessment Area...</h2>
      <p style="color: #64748b; font-size: 16px;">Jumbling questions and preparing secure environment.</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
  <script>require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs' }});</script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

  <script>
    const user = JSON.parse(localStorage.getItem('aptiq_user') || '{}');
    const token = localStorage.getItem('aptiq_token');
    if (!token) window.location.href = 'login.html';

    const hallTicket = user.hallTicket || 'STUDENT';
    const watermarkSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="250" height="150"><text x="50%" y="50%" transform="rotate(-30 125 75)" fill="rgba(14,30,60,0.06)" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle" dominant-baseline="middle">${hallTicket}</text></svg>`;
    const watermarkDiv = document.createElement('div');
    watermarkDiv.style.cssText = `position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; background-image: url('data:image/svg+xml;utf8,${encodeURIComponent(watermarkSvg)}');`;
    document.body.appendChild(watermarkDiv);

    const isTaskMode = localStorage.getItem('aptiq_task_mode') === 'true';
    const taskId = localStorage.getItem('aptiq_task_id');
    const taskTitle = localStorage.getItem('aptiq_task_title') || 'Practice Test';
    
    let questions = [];
    let codingQuestions = [];
    let currentIdx = 0;
    
    let score = 0;
    let totalCodingScore = 0;
    
    let codingIdx = 0;
    let timeLeft = 60 * 60; 
    let timerInterval;
    let myEditor;

    const testCard = document.getElementById('testCard');

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    async function startTest() {
      try {
        if (isTaskMode) {
          const res = await fetch(`http://localhost:3000/api/tasks/${taskId}`);
          const taskData = await res.json();
          questions = taskData.questions || [];
          codingQuestions = taskData.codingQuestions || []; 
        } else {
          const topic = localStorage.getItem('aptiq_current_topic');
          const level = localStorage.getItem('aptiq_current_level');
          const res = await fetch(`http://localhost:3000/api/questions?topic=${topic}&level=${level}`);
          questions = await res.json();
          
          // FIX: If the database is empty for Practice Mode, auto-generate dummy questions!
          if (questions.length === 0) {
            questions = Array.from({length: 5}, (_, i) => ({
              question: `Sample Practice Question ${i + 1} for ${topic.toUpperCase()} (${level})`,
              options: ['A. Demo Option 1', 'B. Demo Option 2', 'C. Demo Option 3', 'D. Demo Option 4'],
              answer: 'A. Demo Option 1'
            }));
          }
        }

        if(questions.length === 0 && codingQuestions.length === 0) throw new Error("No questions found.");
        
        shuffleArray(questions);
        startTimer();
        renderMCQUI(); 
      } catch (err) {
        testCard.innerHTML = `<h2 style="color:#ef4444; text-align:center;">${err.message || "Failed to load test data. Check server connection."}</h2>`;
      }
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        const timerEl = document.getElementById('timerDisplay');
        if(timerEl) timerEl.textContent = `${m}:${s}`;
        
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          alert("Time's up! Auto-submitting your test.");
          submitFinalScore();
        }
      }, 1000);
    }

    function renderMCQUI() {
      if (currentIdx >= questions.length) {
        if (codingQuestions.length > 0) {
          renderCodingUI();
          return;
        } else {
          submitFinalScore();
          return;
        }
      }

      const q = questions[currentIdx];
      const progressPercent = ((currentIdx) / questions.length) * 100;

      testCard.innerHTML = `
        <div class="test-header">
          <div class="q-info">
            <span class="q-number">Question ${currentIdx + 1} of ${questions.length}</span>
            <span class="q-task">ASSIGNMENT: ${taskTitle}</span>
          </div>
          <div class="timer">⏱️ <span id="timerDisplay">--:--</span></div>
          <div class="progress-info">
            Correct: ${score}
            <div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%"></div></div>
          </div>
        </div>

        <div class="question-text">${q.question}</div>
        
        <div class="options-grid" id="optionsGrid">
          ${q.options.map((opt, i) => `
            <button class="option-btn" data-opt="${opt}" onclick="selectOption(this, '${opt}', '${q.answer}')">
              <div class="opt-letter">${String.fromCharCode(65 + i)}</div>
              <div>${opt.substring(3)}</div>
            </button>
          `).join('')}
        </div>

        <div class="controls">
          <button class="btn btn-ghost" onclick="window.location.href='dashboard.html'">Abort Test</button>
          <button class="btn btn-primary" id="nextBtn" disabled onclick="nextQuestion()" style="opacity: 0.5; cursor: not-allowed;">Next Question</button>
        </div>
      `;
    }

    window.selectOption = function(btn, chosenOpt, correctOpt) {
      const isCorrect = (chosenOpt === correctOpt);
      if (isCorrect) score++;

      const allButtons = document.querySelectorAll('.option-btn');
      allButtons.forEach(b => {
        b.style.pointerEvents = 'none'; 
        const thisOpt = b.getAttribute('data-opt');
        if (thisOpt === correctOpt) b.classList.add('correct');
        else if (thisOpt === chosenOpt && !isCorrect) b.classList.add('wrong');
      });

      const nextBtn = document.getElementById('nextBtn');
      nextBtn.disabled = false;
      nextBtn.style.opacity = '1';
      nextBtn.style.cursor = 'pointer';
    };

    window.nextQuestion = function() {
      currentIdx++;
      renderMCQUI();
    };

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const videoElement = document.getElementById('webcam');
        if(videoElement) videoElement.srcObject = stream;
      } catch (err) { console.error("Camera access denied or failed."); }
    }

    function renderCodingUI() {
      if (codingIdx >= codingQuestions.length) {
        submitFinalScore();
        return;
      }

      const cq = codingQuestions[codingIdx];
      testCard.style.maxWidth = '1400px';

      testCard.innerHTML = `
        <div class="test-header" style="margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px;">
          <div class="q-info">
            <span class="q-number" style="color: #0f172a;">AptIQ | Technical Round</span>
            <span class="q-task" style="color: #8b5cf6;">Python Challenge ${codingIdx + 1} of ${codingQuestions.length}</span>
          </div>
          
          <div style="display: flex; gap: 20px; align-items: center;">
            <div class="timer">⏱️ <span id="timerDisplay">--:--</span></div>
            <div class="proctor-box">
              <div class="proctor-text">
                <span>🔴 LIVE PROCTORING</span>
                <span style="font-weight: normal; color: #7f1d1d;">Camera active</span>
              </div>
              <video id="webcam" class="video-feed" autoplay muted playsinline></video>
            </div>
          </div>
        </div>

        <div style="display: flex; gap: 25px; height: 500px;">
          <div style="flex: 1; padding-right: 10px; overflow-y: auto;">
            <h3 style="margin-top:0; color:#0f172a; font-size:26px;">${cq.title}</h3>
            <p style="color:#334155; line-height:1.6; font-size: 16px;">${cq.problemStatement}</p>
            
            <div style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-top: 20px;">
              <strong style="color: #0f172a;">Example:</strong><br>
              <div style="margin-top: 8px; font-family: monospace; font-size: 14px;">
                <span style="color: #475569;">Input:</span> <span style="color: #0f172a; font-weight: bold;">${cq.sampleInput || "None"}</span><br>
                <span style="color: #475569;">Output:</span> <span style="color: #0f172a; font-weight: bold;">${cq.sampleOutput}</span>
              </div>
            </div>
          </div>
          
          <div style="flex: 1.3; display: flex; flex-direction: column; background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden;">
            <div style="background: #1e293b; padding: 12px 20px; color: #e2e8f0; font-weight: bold; font-family: monospace; display: flex; justify-content: space-between;">
              <span>main.py</span>
              <span style="color: #10b981;">Python 3.10</span>
            </div>
            
            <div id="monacoContainer" style="flex: 1; width: 100%;"></div>
            
            <div class="terminal-scroll" style="height: 250px; background: #0f172a; padding: 15px; overflow-y: auto; color: #f8fafc; font-family: monospace; border-top: 2px solid #334155;">
              <div style="font-weight: bold; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 10px;">Execution Terminal</div>
              <div id="consoleBody">Awaiting execution...</div>
            </div>

            <div class="controls" style="padding: 15px 20px; background: white; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #e2e8f0; margin-top: 0;">
              <button class="btn btn-ghost" onclick="runCode(false)" style="background: #f1f5f9; color: #0f172a;">Run Code</button>
              <button class="btn btn-primary" id="submitBtn" onclick="runCode(true)" style="background: #10b981; color: white;">Submit Answer</button>
            </div>
          </div>
        </div>
      `;

      startCamera();
      
      require(['vs/editor/editor.main'], function () {
        document.getElementById('monacoContainer').innerHTML = '';
        myEditor = monaco.editor.create(document.getElementById('monacoContainer'), {
          value: "# Read standard input automatically\n# Example: n = int(input())\n\n",
          language: 'python',
          theme: 'vs-dark',
          automaticLayout: true,
          minimap: { enabled: false },
          fontSize: 15
        });
      });
    }

    let pyodideInstance = null;

    // --- DETAILED 6-TEST-CASE ENGINE ---
    window.runCode = async function(isSubmit) {
      const code = myEditor.getValue();
      const consoleBody = document.getElementById('consoleBody');
      const submitBtn = document.getElementById('submitBtn');
      const cq = codingQuestions[codingIdx];

      if(code.trim() === '') {
        consoleBody.innerHTML = `<span style="color: #ef4444;">Error: Editor is empty. Please write some code.</span>`;
        return;
      }

      consoleBody.innerHTML = `<div id="tc-log"></div>`;
      const log = document.getElementById('tc-log');
      log.innerHTML += `<div style="color: #fbbf24; margin-bottom: 15px;">⚙️ Booting Secure Sandbox...</div>`;

      // NEW: SMART TEST CASE GENERATOR
      // Dynamically recognizes the question and supplies 6 varied inputs
      let cases = [];
      if (cq.testCases && cq.testCases.length >= 6) {
        cases = cq.testCases.slice(0, 6);
      } else {
        const titleText = (cq.title || "").toLowerCase();
        if (titleText.includes("even") || titleText.includes("odd")) {
          cases = [ { input: "4", expected: "Even" }, { input: "7", expected: "Odd" }, { input: "0", expected: "Even" }, { input: "-5", expected: "Odd" }, { input: "100", expected: "Even" }, { input: "21", expected: "Odd" } ];
        } else if (titleText.includes("sum")) {
          cases = [ { input: "1 2 3", expected: "6" }, { input: "0 0 0", expected: "0" }, { input: "-1 1", expected: "0" }, { input: "10 20 30", expected: "60" }, { input: "5", expected: "5" }, { input: "-5 -10", expected: "-15" } ];
        } else if (titleText.includes("factorial")) {
          cases = [ { input: "5", expected: "120" }, { input: "3", expected: "6" }, { input: "0", expected: "1" }, { input: "1", expected: "1" }, { input: "6", expected: "720" }, { input: "4", expected: "24" } ];
        } else if (titleText.includes("vowel")) {
          cases = [ { input: "education", expected: "5" }, { input: "hello", expected: "2" }, { input: "rhythm", expected: "0" }, { input: "AEIOU", expected: "5" }, { input: "apple", expected: "2" }, { input: "Python", expected: "1" } ];
        } else if (titleText.includes("reverse")) {
          cases = [ { input: "hello", expected: "olleh" }, { input: "world", expected: "dlrow" }, { input: "a", expected: "a" }, { input: "racecar", expected: "racecar" }, { input: "12345", expected: "54321" }, { input: "Python", expected: "nohtyP" } ];
        } else {
          // Ultimate fallback for completely unknown topics
          const baseInp = cq.sampleInput || "1";
          const baseOut = cq.sampleOutput ? cq.sampleOutput.trim() : "Output";
          for(let i=1; i<=6; i++) {
             cases.push({ input: `${baseInp} (Test ${i})`, expected: baseOut });
          }
        }
      }

      let passedCount = 0;

      try {
        if (!pyodideInstance) {
           pyodideInstance = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/" });
        }

        for(let i = 0; i < cases.length; i++) {
          let tc = cases[i];
          
          let placeholderHtml = `<div id="tc-${i}" style="margin-bottom: 10px; color: #94a3b8; font-size: 13px;">Running Test Case ${i+1}...</div>`;
          log.innerHTML += placeholderHtml;
          
          const setupCode = `
import sys, io
sys.stdout = io.StringIO()
sys.stderr = io.StringIO()
sys.stdin = io.StringIO("""${tc.input}""")
`;
          await pyodideInstance.runPythonAsync(setupCode);
          await pyodideInstance.runPythonAsync(code);
          let rawOutput = await pyodideInstance.runPythonAsync(`sys.stdout.getvalue()`);
          let actualOutput = rawOutput.trim();

          let isPass = (actualOutput === tc.expected);
          if (isPass) passedCount++;

          let resultHtml = `
            <div style="margin-bottom: 10px; padding: 12px; background: #1e293b; border-radius: 6px; border-left: 4px solid ${isPass ? '#10b981' : '#ef4444'}; line-height: 1.6;">
              <strong style="color: ${isPass ? '#10b981' : '#ef4444'}; font-size: 14px;">${isPass ? '✅ Passed' : '❌ Failed'} - Test Case ${i+1}</strong><br>
              <div style="display: grid; grid-template-columns: 80px 1fr; margin-top: 5px;">
                <span style="color: #94a3b8; font-size: 13px;">Input:</span> <span style="color: #f8fafc; font-size: 13px; font-family: monospace;">${tc.input}</span>
                <span style="color: #94a3b8; font-size: 13px;">Expected:</span> <span style="color: #f8fafc; font-size: 13px; font-family: monospace;">${tc.expected}</span>
                <span style="color: #94a3b8; font-size: 13px;">Output:</span> <span style="color: ${isPass ? '#10b981' : '#ef4444'}; font-size: 13px; font-family: monospace;">${actualOutput || "None"}</span>
              </div>
            </div>
          `;
          document.getElementById(`tc-${i}`).innerHTML = resultHtml;
          
          consoleBody.scrollTop = consoleBody.scrollHeight;
        }

        const marksEarned = passedCount * 5;
        if(isSubmit) totalCodingScore += marksEarned; 

        log.innerHTML += `
          <div style="margin-top: 20px; padding: 15px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; text-align: center;">
            <strong style="color: ${passedCount === cases.length ? '#10b981' : '#fbbf24'}; font-size: 18px;">
              Result: Passed ${passedCount}/${cases.length} Test Cases.
            </strong><br>
            <span style="color: #8b5cf6; font-weight: bold; font-size: 16px; display: inline-block; margin-top: 5px;">Marks Earned: ${isSubmit ? marksEarned : "0 (Run Mode)"} / 30</span>
          </div>
        `;
        consoleBody.scrollTop = consoleBody.scrollHeight;

        if(isSubmit) {
          submitBtn.disabled = true;
          submitBtn.textContent = "Moving to next...";
          setTimeout(() => { codingIdx++; renderCodingUI(); }, 4000); 
        }

      } catch (err) {
        let errorMessage = err.message;
        if(errorMessage.includes('File "<exec>"')) errorMessage = errorMessage.split('File "<exec>"')[1].trim(); 
        consoleBody.innerHTML = `
          <h3 style="color: #ef4444; margin: 0 0 10px 0;">🚨 Runtime/Syntax Error</h3>
          <pre style="color: #ef4444; background: #1e293b; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; margin: 0; line-height: 1.5;">${errorMessage}</pre>
        `;
      }
    };

    // --- FINAL SUBMISSION ---
    async function submitFinalScore() {
      clearInterval(timerInterval);
      const timeTakenSecs = (60 * 60) - timeLeft;
      const timeString = `${Math.floor(timeTakenSecs / 60)}m ${timeTakenSecs % 60}s`;
      const finalTopic = isTaskMode ? `TASK: ${taskTitle}` : taskTitle;

      testCard.innerHTML = `<div class="overlay-screen"><h2 style="color: #0f172a;">Saving your results...</h2></div>`;

      const videoElement = document.getElementById('webcam');
      if (videoElement && videoElement.srcObject) {
        videoElement.srcObject.getTracks().forEach(track => track.stop());
      }

      try {
        const res = await fetch('http://localhost:3000/api/save-score', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, score, codingScore: totalCodingScore, topicName: finalTopic, timeTaken: timeString })
        });
        const data = await res.json();
        
        if (res.ok) {
          user.highestScore = data.user.highestScore;
          user.recentTest = data.user.recentTest;
          user.testHistory = data.user.testHistory;
          localStorage.setItem('aptiq_user', JSON.stringify(user));
          
          testCard.innerHTML = `
            <div class="overlay-screen">
              <h1 style="font-size: 54px; margin-bottom: 10px; margin-top: 0;">🎉</h1>
              <h2 style="color: #0f172a; font-size: 28px; margin-top: 0;">Assessment Complete!</h2>
              <p style="font-size: 18px; color: #475569;">You scored <b>${score} / ${questions.length}</b> on the MCQs.</p>
              ${codingQuestions.length > 0 ? `<p style="color: #10b981; font-weight: bold; background: #ecfdf5; display: inline-block; padding: 12px 24px; border-radius: 8px; margin-top: 10px; font-size: 18px;">💻 Python Coding Marks: ${totalCodingScore} / 60</p>` : ''}
              <br><br>
              <button class="btn btn-primary" onclick="window.location.href='dashboard.html'" style="margin-top: 20px; font-size: 18px; padding: 16px 32px;">Return to Dashboard</button>
            </div>
          `;
        }
      } catch (err) {
        testCard.innerHTML = `<h2 style="color:#ef4444; text-align:center;">Failed to save score.</h2>`;
      }
    }

    startTest();
  </script>
</body>
</html>
