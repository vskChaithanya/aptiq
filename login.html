<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AptIQ Portal | Login</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* Transparent body so the 3D canvas shows through */
    body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; background-color: #f0f4f8; overflow: hidden; }
    
    /* 1. The FULLSCREEN 3D Background Canvas */
    #outer3DCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1; 
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
    }
    
    /* 2. The Split Layout Card (Glassmorphism effect) */
    .split-layout { 
      display: flex; 
      width: 100%; 
      max-width: 1000px; 
      background: rgba(255, 255, 255, 0.90); /* Slight transparency */
      backdrop-filter: blur(12px); /* Blurs the 3D text passing directly behind it */
      border-radius: 20px; 
      box-shadow: 0 25px 50px rgba(15, 23, 42, 0.15), 0 0 0 1px rgba(255,255,255,0.5); 
      overflow: hidden; 
      min-height: 550px; 
      position: relative; 
      z-index: 10;
    }
    /* LEFT SIDE: The Image Box */
    .illustration-side { 
      flex: 1.2; 
      background-color: #ffffff; 
      display: flex;             
      justify-content: center;   /* Centers horizontally (Left/Right) */
      align-items: center;       /* Centers vertically (Top/Bottom) */
      position: relative; 
      overflow: hidden; 
      border-right: 1px solid rgba(226, 232, 240, 0.8); 
    }
    
    .illustration-side img {
      width: 100%;                /* Adjust this to make it wider/narrower */
      height: auto;              
      max-height:400%;           
      object-fit: contain;       
      
      /* Optional: If it is perfectly centered but you STILL want it lower, 
         uncomment the line below and adjust the number */
      /* margin-top: 40px; */    
    }

    /* RIGHT SIDE: Form */
    .form-side { flex: 1; padding: 50px 60px; display: flex; flex-direction: column; justify-content: center; background: white; }
    
    /* Typography & Branding */
    .logo-text { font-size: 36px; font-weight: 800; color: #0f172a; text-align: center; margin: 0 0 5px 0; letter-spacing: -1px; }
    .logo-text span { color: #3b82f6; }
    .login-heading { text-align: center; font-size: 14px; font-weight: bold; letter-spacing: 2px; margin-bottom: 25px; color: #64748b; text-transform: uppercase; }

    /* Tabs */
    .tabs { display: flex; background: #f1f5f9; border-radius: 8px; padding: 5px; margin-bottom: 25px; }
    .tab { flex: 1; padding: 10px; border: none; background: transparent; cursor: pointer; border-radius: 6px; font-weight: bold; color: #64748b; font-size: 13px; transition: 0.2s; }
    .tab.active { background: white; color: #3b82f6; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    /* Inputs */
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-label { display: block; font-size: 13px; font-weight: bold; color: #1e293b; margin-bottom: 8px; }
    .input-label span { color: #ef4444; }
    
    .input-wrapper { position: relative; display: flex; align-items: center; border: 2px solid #e2e8f0; border-radius: 8px; overflow: hidden; transition: 0.2s; background: white; }
    .input-wrapper:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
    
    .input-icon { padding: 0 15px; color: #94a3b8; display: flex; align-items: center; }
    .input-icon svg { width: 18px; height: 18px; }
    
    .input-field { border: none; padding: 14px 14px 14px 0; width: 100%; outline: none; font-size: 15px; color: #0f172a; background: transparent; }
    
    /* Options Row */
    .options-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-size: 13px; color: #1e293b; font-weight: 600; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .forgot-link { color: #3b82f6; text-decoration: none; cursor: pointer; }
    .forgot-link:hover { text-decoration: underline; }

    /* Buttons */
    .btn-sign-in { background: #3b82f6; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-sign-in:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.2); }
    
    .btn-outline { background: white; border: 2px solid #e2e8f0; color: #0f172a; width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

    /* Utilities */
    .register-link { text-align: center; margin-top: 20px; font-size: 14px; color: #64748b; font-weight: 600; }
    .register-link a { color: #3b82f6; text-decoration: none; }
    #msgBox { margin-top: 15px; font-size: 13px; font-weight: bold; text-align: center; }
    
    .reset-section { display: none; margin-top: 20px; border-top: 2px solid #f1f5f9; padding-top: 20px; }

    @media (max-width: 768px) {
      .illustration-side { display: none; }
      .form-side { padding: 40px 30px; }
      .split-layout { min-height: auto; }
    }
  </style>
</head>
<body>

  <canvas id="outer3DCanvas"></canvas>

  <div class="split-layout">
    
    <div class="illustration-side">
      <img src="https://www.imscdr.ac.in/public/images/frontend/python.webp" alt="AptIQ Portal Banner">
    </div>

    <div class="form-side">
      <div id="mainLoginSection">
        <h1 class="logo-text">Apti<span>Q</span></h1>
        <div class="login-heading">Login</div>

        <div class="tabs">
          <button class="tab active" id="tab-student" onclick="switchRole('student')">Student</button>
          <button class="tab" id="tab-faculty" onclick="switchRole('faculty')">Faculty</button>
        </div>

        <form id="loginForm">
          <div class="input-group">
            <label class="input-label" id="emailLabel">Email / Hallticket Number <span>*</span></label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
              </span>
              <input type="email" id="loginEmail" class="input-field" placeholder="student@sru.edu.in" required>
            </div>
          </div>

          <div class="input-group">
            <label class="input-label">Password <span>*</span></label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
              </span>
              <input type="password" id="loginPassword" class="input-field" placeholder="Password" required>
            </div>
          </div>

          <div class="options-row">
            <label class="checkbox-label">
              <input type="checkbox" onclick="togglePasswordVisibility()"> Show Password
            </label>
            <a class="forgot-link" onclick="toggleResetSection()">Forgot Password ?</a>
          </div>

          <button type="submit" class="btn-sign-in" id="loginBtnText">Sign in</button>
        </form>

        <div class="register-link">
          Don't have an account? <a href="register.html">Register</a>
        </div>
      </div>

      <div id="resetContainer" class="reset-section">
        <h3 style="margin-top:0; color:#0f172a; font-size:18px;">Reset Password</h3>
        <div id="step-1">
          <div class="input-wrapper" style="margin-bottom: 15px;">
            <input type="email" id="resetEmail" class="input-field" style="padding-left:15px;" placeholder="Enter registered email">
          </div>
          <button type="button" class="btn-outline" onclick="sendOTP()" id="btnSendOTP">Send OTP</button>
          <button type="button" class="btn-outline" style="border:none; color:#64748b;" onclick="toggleResetSection()">Cancel</button>
        </div>
        <div id="step-2" style="display: none;">
          <div class="input-wrapper" style="margin-bottom: 15px;">
            <input type="text" id="resetOtp" class="input-field" style="padding-left:15px; letter-spacing: 2px;" placeholder="Enter 6-digit OTP" maxlength="6">
          </div>
          <button type="button" class="btn-sign-in" onclick="verifyOTP()">Verify OTP</button>
        </div>
        <div id="step-3" style="display: none;">
          <div class="input-wrapper" style="margin-bottom: 15px;">
            <input type="password" id="newPassword" class="input-field" style="padding-left:15px;" placeholder="Enter New Password">
          </div>
          <button type="button" class="btn-sign-in" onclick="resetPassword()">Update Password</button>
        </div>
      </div>
      <div id="msgBox"></div>
    </div>
  </div>

  <script>
    // --------------------------------------------------------
    // 1. OUTER 3D MATH & PYTHON ENGINE (Runs behind the card)
    // --------------------------------------------------------
    const outerCanvas = document.getElementById('outer3DCanvas');
    const outerCtx = outerCanvas.getContext('2d');

    let outerParticles = [];
    let angleX = 0;
    let angleY = 0;

    const bgContent = [
      '∫e^x dx', '∑(n=1 to ∞)', 'f(x)=ax²+bx+c', 'import numpy as np', 
      'def __init__(self):', '∇×F', 'O(n log n)', 'print("AptIQ")', 
      'λx: x²', 'lim(x→∞)', 'E = mc²', 'pd.DataFrame()', 
      'model.fit(X, y)', 'return True', '[1, 2, 3]', 'math.sqrt()'
    ];
    const bgColors = ['#3b82f6', '#64748b', '#94a3b8', '#cbd5e1', '#f59e0b']; 

    function resizeOuter() {
      outerCanvas.width = window.innerWidth;
      outerCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeOuter);
    resizeOuter();

    for (let i = 0; i < 120; i++) {
      outerParticles.push({
        x: (Math.random() - 0.5) * 2500, 
        y: (Math.random() - 0.5) * 2500, 
        z: (Math.random() - 0.5) * 2500, 
        text: bgContent[Math.floor(Math.random() * bgContent.length)],
        color: bgColors[Math.floor(Math.random() * bgColors.length)],
        baseSize: Math.random() * 20 + 15 
      });
    }

    function drawOuter3D() {
      outerCtx.clearRect(0, 0, outerCanvas.width, outerCanvas.height);
      
      const cx = outerCanvas.width / 2;
      const cy = outerCanvas.height / 2;
      const fov = 600; 

      angleX += 0.0004; 
      angleY += 0.0008;

      let projectedPoints = [];

      for (let p of outerParticles) {
        let cosY = Math.cos(angleY), sinY = Math.sin(angleY);
        let x1 = p.x * cosY - p.z * sinY;
        let z1 = p.z * cosY + p.x * sinY;

        let cosX = Math.cos(angleX), sinX = Math.sin(angleX);
        let y2 = p.y * cosX - z1 * sinX;
        let z2 = z1 * cosX + p.y * sinX;

        let z = z2 + 1200; 
        if (z < 1) z = 1;  
        let scale = fov / z; 
        let px = cx + x1 * scale;
        let py = cy + y2 * scale;

        projectedPoints.push({ 
          x: px, y: py, z: z, scale: scale, 
          text: p.text, color: p.color, baseSize: p.baseSize 
        });
      }

      projectedPoints.sort((a, b) => b.z - a.z);

      outerCtx.textAlign = 'center';
      outerCtx.textBaseline = 'middle';

      for (let p of projectedPoints) {
        let alpha = Math.min(1, Math.max(0, 1.8 - p.z / 1200));
        outerCtx.globalAlpha = alpha;
        outerCtx.fillStyle = p.color;
        let fontSize = p.baseSize * p.scale;
        outerCtx.font = `bold ${fontSize}px monospace`;
        outerCtx.fillText(p.text, p.x, p.y);
      }
      
      requestAnimationFrame(drawOuter3D);
    }
    drawOuter3D();


    // --------------------------------------------------------
    // 2. AUTHENTICATION & UI LOGIC
    // --------------------------------------------------------
    let currentRole = 'student';

    function togglePasswordVisibility() {
      const input = document.getElementById('loginPassword');
      input.type = input.type === "password" ? "text" : "password";
    }

    function switchRole(role) {
      currentRole = role;
      document.getElementById('tab-student').classList.toggle('active', role === 'student');
      document.getElementById('tab-faculty').classList.toggle('active', role === 'faculty');
      
      const emailInput = document.getElementById('loginEmail');
      const emailLabel = document.getElementById('emailLabel');
      
      if(role === 'student') {
        emailLabel.innerHTML = 'Email / Hallticket Number <span>*</span>';
        emailInput.placeholder = 'student@sru.edu.in';
      } else {
        emailLabel.innerHTML = 'Admin Email Address <span>*</span>';
        emailInput.placeholder = 'aptiq.noreply@gmail.com';
      }
    }

    function showMessage(msg, isSuccess) {
      const box = document.getElementById('msgBox');
      box.textContent = msg;
      box.style.color = isSuccess ? '#10b981' : '#ef4444';
      setTimeout(() => box.textContent = '', 5000);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtnText');
      
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('http://localhost:3000/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (res.ok) {
          if (data.user.role !== currentRole) {
            btn.textContent = 'Sign in';
            return showMessage(`Account belongs to ${data.user.role}, please switch tabs.`, false);
          }
          localStorage.setItem('aptiq_token', data.token);
          localStorage.setItem('aptiq_user', JSON.stringify(data.user));
          window.location.href = currentRole === 'student' ? 'dashboard.html' : 'faculty_dashboard.html';
        } else {
          showMessage(data.message, false);
          btn.textContent = 'Sign in';
        }
      } catch (err) { 
        showMessage('Server error. Please start Node server.', false); 
        btn.textContent = 'Sign in';
      }
    });

    let resetEmailTarget = "";

    function toggleResetSection() {
      const container = document.getElementById('resetContainer');
      const mainLogin = document.getElementById('mainLoginSection');
      
      if(container.style.display === 'none' || container.style.display === '') {
        container.style.display = 'block';
        mainLogin.style.display = 'none';
        document.getElementById('step-1').style.display = 'block';
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('step-3').style.display = 'none';
        document.getElementById('resetEmail').value = document.getElementById('loginEmail').value;
      } else {
        container.style.display = 'none';
        mainLogin.style.display = 'block';
      }
    }

    async function sendOTP() {
      const email = document.getElementById('resetEmail').value;
      if (!email) return showMessage("Please enter your email.", false);
      const btn = document.getElementById('btnSendOTP');
      btn.textContent = "Sending..."; btn.disabled = true;

      try {
        const res = await fetch('http://localhost:3000/api/forgot-password/send-otp', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email })
        });
        if (res.ok) {
          resetEmailTarget = email;
          showMessage("OTP sent! Check your email or terminal.", true);
          document.getElementById('step-1').style.display = 'none';
          document.getElementById('step-2').style.display = 'block';
        } else { showMessage(await res.json().message, false); }
      } catch (err) { showMessage('Server error.', false); }
      btn.textContent = "Send OTP"; btn.disabled = false;
    }

    async function verifyOTP() {
      const otp = document.getElementById('resetOtp').value;
      if (otp.length !== 6) return showMessage("Enter a 6-digit OTP.", false);

      try {
        const res = await fetch('http://localhost:3000/api/forgot-password/verify-otp', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: resetEmailTarget, otp })
        });
        if (res.ok) {
          showMessage("OTP Verified!", true);
          document.getElementById('step-2').style.display = 'none';
          document.getElementById('step-3').style.display = 'block';
        } else { showMessage("Invalid OTP.", false); }
      } catch (err) { showMessage('Server error.', false); }
    }

    async function resetPassword() {
      const newPassword = document.getElementById('newPassword').value;
      const otp = document.getElementById('resetOtp').value;
      if (newPassword.length < 5) return showMessage("Password too short.", false);

      try {
        const res = await fetch('http://localhost:3000/api/forgot-password/reset', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: resetEmailTarget, otp, newPassword })
        });
        if (res.ok) {
          showMessage("Password reset successfully! Please Log In.", true);
          setTimeout(() => window.location.reload(), 2000);
        } else { showMessage("Error resetting password.", false); }
      } catch (err) { showMessage('Server error.', false); }
    }
  </script>
</body>
</html>
